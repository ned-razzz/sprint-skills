interface:
  display_name: "Pull Docs From Confluence"
  short_description: "Use environment checks plus sequential REST export and Mermaid rendering for Confluence docs"
  default_prompt: "Use $pull-docs-from-confluence to run the workflow in this order: 1. check `./config.json` for `siteUrl`, `titles`, `spaceKey`, and `outputDir`, and confirm `CONFLUENCE_EMAIL` plus `CONFLUENCE_API_TOKEN` are set; 2. run `python3 scripts/fetch_confluence_metatdata.py --config ./config.json`; 3. run `python3 scripts/export_confluence_assets.py --config ./config.json --bundle-json ./bundle.json`; 4. run `python3 scripts/render_drawio_to_mermaid.py --doc <markdownPath>` for each Markdown file produced by step 3; 5. verify that export failures are zero and rendered documents pass a final `--check` run when needed."
